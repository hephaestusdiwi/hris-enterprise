# =============================================================================
# Redis config — HRIS Enterprise (STEP 7)
# =============================================================================

# Redis dipakai untuk 2 keperluan sekaligus: cache DAN queue driver Laravel.
# Eviction policy default Redis (noeviction) sebenarnya AMAN untuk queue
# (job nggak akan kehapus paksa), tapi bisa bikin Redis nolak write baru kalau
# memory penuh. Kita pilih noeviction secara SADAR di sini — cache di Laravel
# kita anggap "best effort" (boleh MISS), sedangkan job queue TIDAK BOLEH
# hilang diam-diam. Kalau nanti maxmemory kepenuhan, itu harus keliatan
# sebagai error yang jelas (OOM command not allowed), bukan job hilang senyap.
maxmemory 200mb
maxmemory-policy noeviction

# Persistence: AOF (Append Only File) diaktifkan supaya job queue yang belum
# diproses tetap ada kalau container Redis restart tiba-tiba. RDB snapshot
# saja tidak cukup untuk data queue (bisa kehilangan job di antara snapshot).
appendonly yes
appendfsync everysec

# Password wajib walau di internal network — defense in depth, dan bakal
# kepake kalau nanti port Redis ke-expose lebih luas.

# Nonaktifkan command berbahaya di production (FLUSHALL/FLUSHDB bisa
# ngehapus semua cache+queue sekaligus secara tidak sengaja).
rename-command FLUSHALL ""
rename-command FLUSHDB ""

# Log level default cukup untuk dev; production bisa diketatkan di STEP 96.
loglevel notice
