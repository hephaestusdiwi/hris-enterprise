; =============================================================================
; php.ini custom — HRIS Enterprise (STEP 5)
; Di-load sebagai conf.d/99-hris.ini, jadi override default php.ini bawaan image.
; =============================================================================

; Samakan dengan client_max_body_size 100M di nginx (STEP 4) — upload foto
; enroll wajah, dokumen recruitment, lampiran leave request, dll.
upload_max_filesize = 100M
post_max_size = 100M

; Payroll generator / report bulanan bisa berat, kasih ruang lebih dari default.
memory_limit = 256M
max_execution_time = 120
max_input_time = 120

; Timezone Indonesia — dipakai untuk semua fungsi date()/time() di level PHP,
; Laravel sendiri diatur terpisah lewat config/app.php di STEP 11.
date.timezone = Asia/Jakarta

; File upload count (form dengan banyak attachment sekaligus)
max_file_uploads = 20

; Jangan expose versi PHP di header response.
expose_php = Off

; -----------------------------------------------------------------------------
; OPcache — aktif dari dev supaya perilaku konsisten dengan production.
; validate_timestamps=1 (default) supaya perubahan file kebaca otomatis via
; bind mount tanpa perlu restart container. Nanti di STEP 96 (Production
; Docker) baru dimatikan + di-preload untuk performa maksimal.
; -----------------------------------------------------------------------------
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
