server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # Upload lumayan besar (foto produk, foto enroll wajah, dsb) — samakan
    # pola dengan TB Store & mindwayPOS yang juga handle upload gambar.
    client_max_body_size 100M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Pakai resolver + variable (bukan hostname statis langsung di fastcgi_pass)
        # supaya nginx nggak crash saat startup kalau container "php" belum ada/lagi restart.
        # 127.0.0.11 = embedded DNS resolver Docker di custom bridge network.
        resolver 127.0.0.11 valid=10s;
        set $upstream_php php:9000;
        fastcgi_pass $upstream_php;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
    }

    # Blok akses ke file/folder tersembunyi (.env, .git, dll), kecuali .well-known (buat SSL cert nanti)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        font/woff2;

    access_log /var/log/nginx/hris_access.log;
    error_log  /var/log/nginx/hris_error.log warn;
}
